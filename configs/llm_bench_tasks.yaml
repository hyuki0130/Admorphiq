    fallback_stack: [click_grid, bfs_state_space]

  - game: SK48
    game_type: movement
    primary_strategy: sk48_snake             # still frame-only; works at full budget
    fallback_stack: [bfs_state_space, graph_explore]

  - game: SP80
    game_type: movement
    primary_strategy: bfs_state_space
